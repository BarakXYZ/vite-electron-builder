name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      distribution-channel:
        description: Distribution channel used for desktop packaging and release metadata.
        required: false
        default: alpha
        type: string

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
    secrets: inherit
    with:
      distribution-channel: ${{ github.event_name == 'workflow_dispatch' && inputs.distribution-channel || 'alpha' }}
