name: Deploy

on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: "bash"

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{inputs.distribution-channel}}
      url: https://github.com/${{github.repository}}/releases/tag/v${{inputs.app-version}}
    steps:
      - uses: actions/checkout@v6

      - name: Download compiled app
        uses: actions/download-artifact@v7
        with:
          pattern: "*-${{inputs.distribution-channel}}"
          path: apps/desktop/dist/release-assets
          merge-multiple: true

      - run: |
          mapfile -t release_assets < <(node apps/desktop/scripts/release-assets.mjs print apps/desktop/dist/release-assets)
          gh release create "v${{inputs.app-version}}" "${release_assets[@]}" --repo "${{github.repository}}"
        env:
          GH_TOKEN: ${{ github.token }}
