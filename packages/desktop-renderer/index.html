<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="color-scheme" content="light dark" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: ws: wss:; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent a light startup flash before the app theme provider hydrates. -->
    <style>
      :root {
        background-color: #ffffff;
        color-scheme: light;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background-color: #0a0a0a;
          color-scheme: dark;
        }
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background-color: inherit;
      }
    </style>
    <title>renderer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
